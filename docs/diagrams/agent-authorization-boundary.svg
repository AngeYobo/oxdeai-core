<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-label="OxDeAI agent authorization boundary diagram">
  <rect width="980" height="420" fill="#ffffff"/>
  <text x="40" y="38" font-family="monospace" font-size="20" fill="#111">OxDeAI: Agent Authorization Boundary</text>

  <rect x="40" y="78" width="220" height="56" rx="6" fill="#eef5ff" stroke="#1f4f8b"/>
  <text x="60" y="111" font-family="monospace" font-size="14" fill="#111">Agent Runtime</text>

  <rect x="320" y="66" width="270" height="110" rx="6" fill="#f2fff2" stroke="#1b6e1b"/>
  <text x="340" y="98" font-family="monospace" font-size="14" fill="#111">OxDeAI boundary</text>
  <text x="340" y="120" font-family="monospace" font-size="12" fill="#111">PDP evaluate(intent,state)</text>
  <text x="340" y="142" font-family="monospace" font-size="12" fill="#111">AuthorizationV1 (ALLOW only)</text>

  <rect x="650" y="78" width="260" height="56" rx="6" fill="#fff5ea" stroke="#8f4f17"/>
  <text x="670" y="111" font-family="monospace" font-size="14" fill="#111">PEP verifyAuthorization</text>

  <rect x="650" y="178" width="260" height="56" rx="6" fill="#ffffff" stroke="#444"/>
  <text x="670" y="211" font-family="monospace" font-size="14" fill="#111">Tool / External System</text>

  <rect x="40" y="268" width="870" height="106" rx="6" fill="#fafafa" stroke="#999"/>
  <text x="60" y="302" font-family="monospace" font-size="14" fill="#111">Audit Events -> Snapshot -> Verification Envelope -> verifyEnvelope()</text>
  <text x="60" y="326" font-family="monospace" font-size="12" fill="#444">Deterministic evidence path for offline verification.</text>

  <path d="M260 106 L320 106" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M590 106 L650 106" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M780 134 L780 178" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>
</svg>
