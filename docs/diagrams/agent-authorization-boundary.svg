<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-label="OxDeAI Agent Authorization Boundary">
  <rect width="1400" height="860" fill="#ffffff"/>

  <text x="50" y="56" font-family="Inter, Arial, sans-serif" font-size="32" fill="#111827" font-weight="700">OxDeAI Agent Authorization Boundary</text>
  <text x="50" y="90" font-family="Inter, Arial, sans-serif" font-size="18" fill="#374151">OxDeAI sits between agent runtimes and external systems as a deterministic authorization boundary.</text>

  <!-- Left column -->
  <rect x="60" y="190" width="300" height="170" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="84" y="232" font-family="Inter, Arial, sans-serif" font-size="24" fill="#0f172a" font-weight="600">Agent Runtime</text>
  <text x="84" y="270" font-family="Inter, Arial, sans-serif" font-size="16" fill="#334155">LangGraph / CrewAI / OpenAI</text>
  <text x="84" y="296" font-family="Inter, Arial, sans-serif" font-size="16" fill="#334155">Agents SDK / AutoGen /</text>
  <text x="84" y="322" font-family="Inter, Arial, sans-serif" font-size="16" fill="#334155">custom runtime</text>

  <!-- Center column (emphasized) -->
  <rect x="460" y="150" width="500" height="330" rx="14" fill="#eefbf3" stroke="#166534" stroke-width="4"/>
  <text x="490" y="194" font-family="Inter, Arial, sans-serif" font-size="28" fill="#14532d" font-weight="700">OxDeAI Boundary</text>

  <rect x="500" y="220" width="420" height="100" rx="8" fill="#ffffff" stroke="#166534" stroke-width="2"/>
  <text x="524" y="258" font-family="Inter, Arial, sans-serif" font-size="22" fill="#14532d" font-weight="600">PDP - Policy Decision Point</text>
  <text x="524" y="288" font-family="Inter, Arial, sans-serif" font-size="16" fill="#374151">evaluate(intent, state)</text>

  <rect x="500" y="340" width="420" height="118" rx="8" fill="#ffffff" stroke="#166534" stroke-width="2"/>
  <text x="524" y="378" font-family="Inter, Arial, sans-serif" font-size="24" fill="#14532d" font-weight="700">AuthorizationV1</text>
  <text x="524" y="408" font-family="Inter, Arial, sans-serif" font-size="16" fill="#374151">issuer / audience / intent_hash / state_hash /</text>
  <text x="524" y="432" font-family="Inter, Arial, sans-serif" font-size="16" fill="#374151">expiry / signature</text>

  <!-- Right column -->
  <rect x="1040" y="210" width="300" height="120" rx="10" fill="#fff7ed" stroke="#9a3412" stroke-width="2"/>
  <text x="1064" y="252" font-family="Inter, Arial, sans-serif" font-size="24" fill="#7c2d12" font-weight="600">PEP - Execution Gate</text>
  <text x="1064" y="282" font-family="Inter, Arial, sans-serif" font-size="16" fill="#7c2d12">verifyAuthorization()</text>

  <rect x="1040" y="360" width="300" height="130" rx="10" fill="#ffffff" stroke="#475569" stroke-width="2"/>
  <text x="1064" y="404" font-family="Inter, Arial, sans-serif" font-size="23" fill="#0f172a" font-weight="600">External System / Tool</text>
  <text x="1064" y="434" font-family="Inter, Arial, sans-serif" font-size="16" fill="#334155">API / GPU / payment /</text>
  <text x="1064" y="458" font-family="Inter, Arial, sans-serif" font-size="16" fill="#334155">cloud / database</text>

  <!-- Bottom flow -->
  <rect x="500" y="570" width="180" height="74" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="532" y="615" font-family="Inter, Arial, sans-serif" font-size="20" fill="#0f172a">Audit Events</text>

  <rect x="710" y="570" width="190" height="74" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="734" y="615" font-family="Inter, Arial, sans-serif" font-size="20" fill="#0f172a">Snapshot State</text>

  <rect x="940" y="570" width="230" height="74" rx="8" fill="#eef2ff" stroke="#4338ca" stroke-width="2"/>
  <text x="968" y="615" font-family="Inter, Arial, sans-serif" font-size="20" fill="#312e81">Verification Envelope</text>

  <rect x="1200" y="570" width="170" height="74" rx="8" fill="#ecfeff" stroke="#0e7490" stroke-width="2"/>
  <text x="1220" y="615" font-family="Inter, Arial, sans-serif" font-size="20" fill="#155e75">verifyEnvelope()</text>

  <!-- Caption -->
  <text x="50" y="800" font-family="Inter, Arial, sans-serif" font-size="18" fill="#1f2937">OxDeAI enforces deterministic authorization before external actions execute and produces verifiable artifacts afterward.</text>

  <!-- Arrows -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <line x1="360" y1="275" x2="460" y2="275" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="372" y="258" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">proposed action</text>

  <line x1="710" y1="320" x2="710" y2="340" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="730" y="334" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">ALLOW / DENY</text>

  <line x1="920" y1="398" x2="1040" y2="270" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <line x1="1190" y1="330" x2="1190" y2="360" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="1202" y="350" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">execute only if authorized</text>

  <line x1="1190" y1="490" x2="590" y2="570" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <line x1="680" y1="607" x2="710" y2="607" stroke="#334155" stroke-width="2.5"/>
  <line x1="900" y1="607" x2="940" y2="607" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <line x1="1170" y1="607" x2="1200" y2="607" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
</svg>
