<svg xmlns="http://www.w3.org/2000/svg" width="980" height="380" viewBox="0 0 980 380" role="img" aria-label="Adapter sidecar architecture diagram">
  <rect width="980" height="380" fill="#ffffff"/>
  <text x="40" y="38" font-family="monospace" font-size="20" fill="#111">Adapter Sidecar Architecture</text>

  <rect x="40" y="94" width="290" height="72" rx="6" fill="#eef5ff" stroke="#1f4f8b"/>
  <text x="62" y="126" font-family="monospace" font-size="14" fill="#111">Runtime / Framework Adapter</text>
  <text x="62" y="146" font-family="monospace" font-size="12" fill="#444">Translates runtime actions to OxDeAI intents</text>

  <rect x="380" y="94" width="250" height="72" rx="6" fill="#f2fff2" stroke="#1b6e1b"/>
  <text x="452" y="126" font-family="monospace" font-size="14" fill="#111">OxDeAI Sidecar</text>
  <text x="412" y="146" font-family="monospace" font-size="12" fill="#444">PDP/PEP boundary + policy state</text>

  <rect x="680" y="94" width="250" height="72" rx="6" fill="#fff5ea" stroke="#8f4f17"/>
  <text x="702" y="126" font-family="monospace" font-size="14" fill="#111">Tool / External Systems</text>
  <text x="702" y="146" font-family="monospace" font-size="12" fill="#444">APIs, payments, provisioning</text>

  <rect x="40" y="220" width="890" height="100" rx="6" fill="#fafafa" stroke="#999"/>
  <text x="60" y="252" font-family="monospace" font-size="14" fill="#111">Audit Events + Snapshot -> Verification Envelope -> verifyEnvelope()</text>
  <text x="60" y="276" font-family="monospace" font-size="12" fill="#444">Portable, deterministic evidence for offline verification.</text>

  <path d="M330 130 L380 130" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M630 130 L680 130" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>
</svg>
