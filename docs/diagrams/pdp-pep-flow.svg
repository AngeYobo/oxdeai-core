<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-label="PDP and PEP flow diagram">
  <rect width="980" height="360" fill="#ffffff"/>
  <text x="40" y="38" font-family="monospace" font-size="20" fill="#111">PDP / PEP Enforcement Flow</text>

  <rect x="40" y="86" width="280" height="64" rx="6" fill="#eef5ff" stroke="#1f4f8b"/>
  <text x="60" y="116" font-family="monospace" font-size="14" fill="#111">PDP evaluate(intent,state)</text>
  <text x="60" y="134" font-family="monospace" font-size="12" fill="#444">Deterministic policy decision</text>

  <rect x="370" y="86" width="220" height="64" rx="6" fill="#f2fff2" stroke="#1b6e1b"/>
  <text x="392" y="124" font-family="monospace" font-size="14" fill="#111">AuthorizationV1</text>

  <rect x="640" y="86" width="280" height="64" rx="6" fill="#fff5ea" stroke="#8f4f17"/>
  <text x="662" y="124" font-family="monospace" font-size="14" fill="#111">PEP verifyAuthorization</text>

  <rect x="640" y="194" width="280" height="64" rx="6" fill="#ffffff" stroke="#444"/>
  <text x="690" y="224" font-family="monospace" font-size="14" fill="#111">Execute or Refuse</text>
  <text x="676" y="242" font-family="monospace" font-size="12" fill="#444">No auth = no execution</text>

  <path d="M320 118 L370 118" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M590 118 L640 118" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M780 150 L780 194" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>
</svg>
