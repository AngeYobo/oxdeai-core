<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-label="OxDeAI Verification Envelope Flow">
  <rect width="1400" height="760" fill="#ffffff"/>

  <text x="50" y="56" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">OxDeAI Verification Envelope Flow</text>
  <text x="50" y="90" font-family="Inter, Arial, sans-serif" font-size="18" fill="#374151">A verification envelope packages the execution evidence needed for independent verification without re-running the engine.</text>

  <!-- Left: evidence sources -->
  <rect x="70" y="170" width="250" height="74" rx="10" fill="#f0fdf4" stroke="#15803d" stroke-width="2"/>
  <text x="195" y="216" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" fill="#166534" font-weight="600">AuthorizationV1</text>

  <rect x="70" y="290" width="250" height="74" rx="10" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="195" y="336" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" fill="#0f172a" font-weight="600">Audit Events</text>

  <rect x="70" y="410" width="250" height="74" rx="10" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="195" y="456" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" fill="#0f172a" font-weight="600">Snapshot State</text>

  <!-- Center: envelope -->
  <rect x="430" y="150" width="510" height="370" rx="14" fill="#eef2ff" stroke="#4338ca" stroke-width="4"/>
  <text x="685" y="210" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" fill="#312e81" font-weight="700">Verification Envelope</text>

  <rect x="500" y="246" width="370" height="78" rx="8" fill="#ffffff" stroke="#4338ca" stroke-width="2"/>
  <text x="535" y="278" font-family="Inter, Arial, sans-serif" font-size="22" fill="#1f2937">policyId</text>
  <text x="535" y="305" font-family="Inter, Arial, sans-serif" font-size="22" fill="#1f2937">stateHash</text>

  <rect x="500" y="338" width="370" height="78" rx="8" fill="#ffffff" stroke="#4338ca" stroke-width="2"/>
  <text x="535" y="370" font-family="Inter, Arial, sans-serif" font-size="22" fill="#1f2937">auditHeadHash</text>
  <text x="535" y="397" font-family="Inter, Arial, sans-serif" font-size="22" fill="#1f2937">signed / verifiable artifact bundle</text>

  <text x="685" y="474" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#312e81">Portable evidence artifact</text>

  <!-- Right: verification -->
  <rect x="1030" y="236" width="300" height="86" rx="10" fill="#fff7ed" stroke="#9a3412" stroke-width="3"/>
  <text x="1180" y="286" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" fill="#7c2d12" font-weight="700">verifyEnvelope()</text>
  <text x="1180" y="346" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#7c2d12">Offline + deterministic verification</text>

  <rect x="1050" y="400" width="110" height="60" rx="8" fill="#ecfdf5" stroke="#15803d" stroke-width="2"/>
  <text x="1105" y="438" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" fill="#166534" font-weight="600">ok</text>

  <rect x="1175" y="400" width="130" height="60" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="1240" y="438" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" fill="#991b1b" font-weight="600">invalid</text>

  <rect x="1050" y="476" width="255" height="60" rx="8" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
  <text x="1178" y="514" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" fill="#334155" font-weight="600">inconclusive</text>

  <!-- Footer -->
  <text x="50" y="710" font-family="Inter, Arial, sans-serif" font-size="18" fill="#1f2937">No engine re-execution required</text>

  <!-- Arrows -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <line x1="320" y1="207" x2="430" y2="225" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="320" y1="327" x2="430" y2="327" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="320" y1="447" x2="430" y2="429" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <line x1="940" y1="320" x2="1030" y2="279" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <line x1="1180" y1="322" x2="1180" y2="400" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="1180" y1="322" x2="1240" y2="400" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="1180" y1="322" x2="1178" y2="476" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
</svg>
