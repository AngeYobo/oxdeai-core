<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-label="Verification envelope flow diagram">
  <rect width="980" height="360" fill="#ffffff"/>
  <text x="40" y="38" font-family="monospace" font-size="20" fill="#111">Verification Envelope Flow</text>

  <rect x="40" y="94" width="190" height="62" rx="6" fill="#ffffff" stroke="#444"/>
  <text x="68" y="130" font-family="monospace" font-size="14" fill="#111">Audit Events</text>

  <rect x="280" y="94" width="190" height="62" rx="6" fill="#ffffff" stroke="#444"/>
  <text x="332" y="130" font-family="monospace" font-size="14" fill="#111">Snapshot</text>

  <rect x="520" y="94" width="230" height="62" rx="6" fill="#eef5ff" stroke="#1f4f8b"/>
  <text x="540" y="130" font-family="monospace" font-size="14" fill="#111">Verification Envelope</text>

  <rect x="800" y="94" width="150" height="62" rx="6" fill="#f2fff2" stroke="#1b6e1b"/>
  <text x="814" y="130" font-family="monospace" font-size="14" fill="#111">verifyEnvelope()</text>

  <rect x="40" y="216" width="910" height="90" rx="6" fill="#fafafa" stroke="#999"/>
  <text x="60" y="248" font-family="monospace" font-size="14" fill="#111">Result: ok | invalid | inconclusive</text>
  <text x="60" y="272" font-family="monospace" font-size="12" fill="#444">Used for deterministic offline verification across runtimes.</text>

  <path d="M230 125 L280 125" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M470 125 L520 125" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M750 125 L800 125" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>
</svg>
