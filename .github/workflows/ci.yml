name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1 Install pnpm FIRST
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        

      - name: Enable Corepack
        run: corepack enable

      # 2 Then setup node
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Conformance
        run: pnpm -C packages/conformance validate

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
